<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sruthikaa Bala</title>

<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= ROOT VARIABLES ================= */

:root{
  --primary:#ff2e2e;
  --bg-gradient:linear-gradient(135deg,#8B0000,#000 50%,#8B0000);
  --text-gradient:linear-gradient(90deg,#fff,#ff2e2e,#000);
  --outline-gradient:linear-gradient(45deg,#ff2e2e,#000);
}

/* ================= RESET ================= */

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  color:white;
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:var(--bg-gradient);
  background-size:300% 300%;
  animation:bgMove 16s ease infinite alternate;
  z-index:-2;
}

@keyframes bgMove{
  0%{background-position:100% 0%;}
  50%{background-position:0% 100%;}
  100%{background-position:100% 0%;}
}

/* ================= LOGIN SCREEN ================= */

.login-screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(10px);
  z-index:9999;
}

.login-box{
  text-align:center;
  padding:40px;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  border:2px solid transparent;
  border-image:var(--outline-gradient) 1;
  box-shadow:0 0 30px var(--primary);
  cursor:pointer;
}

.login-box img{
  width:130px;height:130px;
  border-radius:50%;
  object-fit:cover;
  padding:4px;
  background:var(--outline-gradient);
  margin-bottom:20px;
}

.login-box h2{
  font-family:'ADLaM Display',cursive;
  margin-bottom:10px;
}

.login-box p{
  opacity:0.85;
}

/* ================= MAIN CONTAINER ================= */

.main{
  display:none;
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.blur{
  filter:blur(8px);
  pointer-events:none;
}

/* ================= THEME DROPDOWN ================= */

.theme-select{
  position:absolute;
  right:20px;
  top:20px;
}

select{
  padding:6px 10px;
  border-radius:8px;
}

/* ================= PROFILE ================= */

.profile{
  text-align:center;
  margin-bottom:25px;
}

.profile img{
  width:140px;height:140px;
  border-radius:50%;
  object-fit:cover;
  padding:4px;
  background:var(--outline-gradient);
}

.profile h1{
  font-family:'ADLaM Display',cursive;
  font-size:28px;
  margin-top:10px;
  background:var(--text-gradient);
  -webkit-background-clip:text;
  color:transparent;
  background-size:200%;
  animation:textMove 6s linear infinite;
}

@keyframes textMove{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

.about{
  text-align:center;
  margin-top:15px;
  margin-bottom:25px;
}

/* ================= SMALL RECT TILES ================= */

.top-tiles{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.small-tile{
  padding:10px 24px;
  border-radius:14px;
  background:rgba(0,0,0,0.5);
  border:2px solid transparent;
  border-image:var(--outline-gradient) 1;
  cursor:pointer;
  transition:0.3s;
}

.small-tile:hover{
  box-shadow:0 0 20px var(--primary);
}

/* ================= DIVIDER ================= */

.divider{
  height:2px;
  background:linear-gradient(to right,transparent,var(--primary),transparent);
  margin:30px 0;
}

/* ================= MAIN GRID ================= */

.grid{
  display:grid;
  gap:30px;
  max-width:800px;
  margin:auto;
}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

.tile{
  height:120px;
  border-radius:18px;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.tile::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:2px;
  background:var(--outline-gradient);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

.tile:hover{
  box-shadow:0 0 25px var(--primary);
}

.tile span{
  font-family:'ADLaM Display',cursive;
  display:inline-block;
}

/* ================= MODAL TAROT ================= */

.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  z-index:9999;
}

.modal.active{display:flex;}

.card{
  width:340px;
  height:440px;
  perspective:1200px;
}

.card-inner{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.8s ease;
}

.card-inner.flip{transform:rotateY(180deg);}

.card-face{
  position:absolute;
  width:100%;height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.8);
  box-shadow:0 0 30px var(--primary);
}

.card-back{transform:rotateY(180deg);}

.close{
  position:absolute;
  top:20px;right:25px;
  cursor:pointer;
  font-size:20px;
}

/* ================= POPUP ================= */

.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  width:320px;
  padding:25px;
  background:rgba(0,0,0,0.9);
  border-radius:20px;
  border:2px solid transparent;
  border-image:var(--outline-gradient) 1;
  box-shadow:0 0 25px var(--primary);
  opacity:0;
  transition:0.4s;
  z-index:9999;
}

.popup.active{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="login">
<div class="login-box" onclick="enterSite()">
<img src="portfolio picture.jpg">
<h2>@sruthikaabala</h2>
<p>Enter this profile to explore the ambition behind the story.</p>
</div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">

<div class="theme-select">
<select onchange="changeTheme(this.value)">
<option value="red">Neon Red</option>
<option value="insta">Instagram</option>
<option value="blue">Blue Neon</option>
</select>
</div>

<div class="profile">
<img src="portfolio picture.jpg">
<h1>Sruthikaa Bala</h1>
</div>

<div class="about">
Strategic professional transitioning from executive operations into digital growth systems.
</div>

<div class="top-tiles">
<div class="small-tile" onclick="openPopup('Email: you@email.com')">Contact</div>
<div class="small-tile" onclick="openPopup('Message form coming soon')">Message</div>
<div class="small-tile" onclick="openPopup('Resume will be added soon')">Resume</div>
</div>

<div class="divider"></div>

<div class="grid">
<div class="tile" onclick="openCard('EDUCATION','Education details here')"><span>EDUCATION</span></div>
<div class="tile" onclick="openCard('EXPERIENCE','Experience details here')"><span>EXPERIENCE</span></div>
<div class="tile" onclick="openCard('SKILLS','Skills details')"><span>SKILLS</span></div>
<div class="tile" onclick="openCard('PROJECTS','Projects')"><span>PROJECTS</span></div>
<div class="tile" onclick="openCard('CERTIFICATIONS','Certifications')"><span>CERTIFICATIONS</span></div>
<div class="tile" onclick="openCard('ACHIEVEMENTS','Achievements')"><span>ACHIEVEMENTS</span></div>
</div>

</div>

<!-- TAROT MODAL -->
<div class="modal" id="modal">
<div class="close" onclick="closeModal()">✕</div>
<div class="card">
<div class="card-inner" id="cardInner">
<div class="card-face" id="cardFront"></div>
<div class="card-face card-back" id="cardBack"></div>
</div>
</div>
</div>

<!-- POPUP -->
<div class="popup" id="popupBox">
<div style="text-align:right;cursor:pointer;" onclick="closePopup()">✕</div>
<div id="popupContent"></div>
</div>

<script>

/* LOGIN */
function enterSite(){
document.getElementById("login").style.display="none";
document.getElementById("mainContent").style.display="block";
}

/* TAROT */
let modal=document.getElementById("modal");
let cardInner=document.getElementById("cardInner");
let cardFront=document.getElementById("cardFront");
let cardBack=document.getElementById("cardBack");

function openCard(title,content){
modal.classList.add("active");
document.getElementById("mainContent").classList.add("blur");
cardFront.innerText=title;
cardBack.innerText=content;
cardInner.classList.remove("flip");
setTimeout(()=>{cardInner.classList.add("flip");},500);
}

function closeModal(){
cardInner.classList.remove("flip");
modal.classList.remove("active");
document.getElementById("mainContent").classList.remove("blur");
}

/* POPUP */
function openPopup(content){
document.getElementById("popupContent").innerText=content;
document.getElementById("popupBox").classList.add("active");
document.getElementById("mainContent").classList.add("blur");
}
function closePopup(){
document.getElementById("popupBox").classList.remove("active");
document.getElementById("mainContent").classList.remove("blur");
}

/* THEMES */
function changeTheme(theme){
if(theme==="red"){
document.documentElement.style.setProperty("--primary","#ff2e2e");
document.documentElement.style.setProperty("--bg-gradient","linear-gradient(135deg,#8B0000,#000 50%,#8B0000)");
document.documentElement.style.setProperty("--outline-gradient","linear-gradient(45deg,#ff2e2e,#000)");
document.documentElement.style.setProperty("--text-gradient","linear-gradient(90deg,#fff,#ff2e2e,#000)");
}
if(theme==="insta"){
document.documentElement.style.setProperty("--primary","#E1306C");
document.documentElement.style.setProperty("--bg-gradient","linear-gradient(135deg,#833AB4,#E1306C,#FCAF45)");
document.documentElement.style.setProperty("--outline-gradient","linear-gradient(45deg,#833AB4,#E1306C,#FCAF45)");
document.documentElement.style.setProperty("--text-gradient","linear-gradient(90deg,#833AB4,#E1306C,#FCAF45)");
}
if(theme==="blue"){
document.documentElement.style.setProperty("--primary","#00aaff");
document.documentElement.style.setProperty("--bg-gradient","linear-gradient(135deg,#001f3f,#000 50%,#001f3f)");
document.documentElement.style.setProperty("--outline-gradient","linear-gradient(45deg,#00aaff,#000)");
document.documentElement.style.setProperty("--text-gradient","linear-gradient(90deg,#00aaff,#fff,#000)");
}
}

</script>

</body>
</html>
