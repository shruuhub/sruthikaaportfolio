<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sruthikaa Bala | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=ADLaM+Display&display=swap" rel="stylesheet">

<style>
:root{
  --insta: linear-gradient(45deg,#833ab4,#c13584,#fd1d1d,#f56040,#fcb045);
}

/* Background animated red-black wave */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:#fff;
  min-height:100vh;
  background: linear-gradient(135deg,#2b0000,#000,#400000,#000);
  background-size:400% 400%;
  animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.user-id{
  font-size:28px;
  font-weight:500;
  cursor:pointer;
  background:var(--insta);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  transition:0.3s;
}

.user-id:hover{
  transform:scale(1.1);
}

.note{
  opacity:0.7;
  margin-top:10px;
}

/* PROFILE */
#profile{
  display:none;
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

.profile-header{
  display:flex;
  align-items:center;
  gap:40px;
}

.profile-pic{
  width:150px;
  height:150px;
  border-radius:50%;
  padding:4px;
  background:var(--insta);
}

.profile-pic img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

.profile-info h1{
  margin-bottom:10px;
}

.profile-bio{
  max-width:500px;
  opacity:0.8;
  margin-bottom:20px;
}

/* BUTTON TILES */
.action-row{
  display:flex;
  gap:20px;
}

.tile-btn{
  padding:15px 25px;
  border-radius:20px;
  font-family:'ADLaM Display',cursive;
  font-size:18px;
  cursor:pointer;
  background:#111;
  position:relative;
  transition:0.3s;
  color:#ff3b3b;
  text-shadow:0 0 8px #ff0000;
}

.tile-btn:hover{
  background:var(--insta);
  color:#fff;
  box-shadow:0 0 20px red;
  transform:translateY(-5px) scale(1.05);
}

.divider{
  margin:40px 0;
  height:2px;
  background:linear-gradient(to right,transparent,red,transparent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.post{
  height:180px;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'ADLaM Display',cursive;
  font-size:20px;
  text-transform:uppercase;
  background:#111;
  cursor:pointer;
  position:relative;
  color:#ff3b3b;
  text-shadow:0 0 8px red;
  transition:0.3s;
}

.post:hover{
  background:var(--insta);
  color:#fff;
  box-shadow:0 0 25px red;
  transform:scale(1.07);
}

/* TAROT MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  width:400px;
  height:500px;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transition:transform 0.8s;
  transform-style:preserve-3d;
}

.card.flip .inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:25px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  text-align:center;
}

.front{
  background:var(--insta);
  font-family:'ADLaM Display',cursive;
  font-size:22px;
}

.back{
  background:#111;
  transform:rotateY(180deg);
  overflow:auto;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  cursor:pointer;
  font-size:18px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<section id="login">
  <div>
    <div>User ID</div>
    <div class="user-id" onclick="enterSite()">@SruthikaaBala</div>
    <div class="note">Please select your user ID to login</div>
  </div>
</section>

<section id="profile">
  <div class="profile-header">
    <div class="profile-pic">
      <img src="portfolio picture.jpg" alt="Sruthikaa Bala">
    </div>
    <div class="profile-info">
      <h1>Sruthikaa Bala</h1>
      <div class="profile-bio">
        Executive assistant transitioning into digital marketing with a focus on growth strategy and brand positioning.
      </div>

      <div class="action-row">
        <div class="tile-btn" onclick="openCard('Contact','Email: yourmail@email.com')">Contact</div>
        <div class="tile-btn" onclick="openCard('Message','You can integrate backend later.')">Message</div>
        <div class="tile-btn" onclick="openCard('Resume','Resume upload link here.')">Resume</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="grid">
    <div class="post" onclick="openCard('Education','BBA in International Business.')">Education</div>
    <div class="post" onclick="openCard('Experience','Executive assistant at McKinsey & Company.')">Experience</div>
    <div class="post" onclick="openCard('Skills','Digital marketing, SQL, communication.')">Skills</div>
    <div class="post" onclick="openCard('Projects','Brand strategy initiatives.')">Projects</div>
    <div class="post" onclick="openCard('Certifications','Google digital marketing certification.')">Certifications</div>
    <div class="post" onclick="openCard('Achievements','Selected at McKinsey.')">Achievements</div>
  </div>
</section>

<div class="modal" id="modal">
  <div class="close" onclick="closeCard()">✕</div>
  <div class="card" id="card">
    <div class="inner">
      <div class="front" id="cardTitle"></div>
      <div class="back" id="cardContent"></div>
    </div>
  </div>
</div>

<script>
function enterSite(){
  document.getElementById("login").style.display="none";
  document.getElementById("profile").style.display="block";
}

function openCard(title,content){
  document.getElementById("cardTitle").innerText=title;
  document.getElementById("cardContent").innerHTML="<div>"+content+"</div>";
  document.getElementById("modal").classList.add("active");
  setTimeout(()=>{document.getElementById("card").classList.add("flip");},300);
}

function closeCard(){
  document.getElementById("card").classList.remove("flip");
  setTimeout(()=>{document.getElementById("modal").classList.remove("active");},400);
}
</script>

</body>
</html>
