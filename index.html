<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shruthika | Portfolio</title>

<style>
:root {
    --bg: #000;
    --card: #111;
    --text: #fff;
    --muted: #aaa;
    --gradient: linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#000;
    color:#fff;
}

/* LANDING */
#landing {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

#landing h1 {
    font-weight:300;
    font-size:clamp(2rem,5vw,3rem);
    background:var(--gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* PROFILE */
#profile {
    display:none;
    max-width:1000px;
    margin:auto;
    padding:40px 20px 80px;
}

.profile-header {
    display:flex;
    flex-wrap:wrap;
    gap:40px;
    align-items:center;
    margin-bottom:40px;
}

/* Gradient Profile Ring */
.profile-pic {
    width:120px;
    height:120px;
    border-radius:50%;
    padding:3px;
    background:var(--gradient);
}

.profile-pic-inner {
    width:100%;
    height:100%;
    border-radius:50%;
    background:#222;
}

.profile-info h2 {
    margin-bottom:10px;
    font-weight:400;
}

.profile-bio {
    color:var(--muted);
    max-width:500px;
    line-height:1.6;
}

/* Buttons */
.profile-buttons {
    margin-top:15px;
    display:flex;
    gap:15px;
}

.action-btn {
    padding:10px 18px;
    border-radius:6px;
    border:1px solid #333;
    background:#111;
    cursor:pointer;
    transition:0.3s;
}

.action-btn:hover {
    background:var(--gradient);
    color:#000;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

/* RGB Border Animation */
.post {
    position:relative;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:15px;
    background:#111;
    color:#fff;
    cursor:pointer;
    overflow:hidden;
}

.post::before {
    content:"";
    position:absolute;
    inset:0;
    padding:2px;
    background:linear-gradient(90deg,red,orange,yellow,green,blue,violet,red);
    background-size:400%;
    animation:rgb 6s linear infinite;
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
}

@keyframes rgb {
    0% {background-position:0% 50%;}
    100% {background-position:400% 50%;}
}

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease;
}

.modal.active {
    opacity:1;
    pointer-events:auto;
}

.modal-content {
    background:#111;
    border:1px solid #333;
    padding:30px;
    width:90%;
    max-width:600px;
    max-height:80vh;
    overflow-y:auto;
    transform:scale(0.8);
    transition:transform 0.3s ease;
}

.modal.active .modal-content {
    transform:scale(1);
}

.close-btn {
    text-align:right;
    cursor:pointer;
    color:#aaa;
    margin-bottom:15px;
}

.close-btn:hover {
    color:#fff;
}

/* FORM */
input, textarea {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#000;
    border:1px solid #333;
    color:#fff;
}

button {
    padding:10px 15px;
    border:none;
    cursor:pointer;
    background:var(--gradient);
    color:#000;
    font-weight:500;
}

/* MOBILE */
@media(max-width:600px){
    .profile-header {gap:20px;}
    .profile-pic {width:90px;height:90px;}
}
</style>
</head>
<body>

<section id="landing" onclick="openProfile()">
    <h1>@shruthika</h1>
</section>

<section id="profile">
    <div class="profile-header">
        <div class="profile-pic">
            <div class="profile-pic-inner"></div>
        </div>

        <div class="profile-info">
            <h2>Shruthika</h2>
            <div class="profile-bio">
                Executive Assistant at McKinsey transitioning into Digital Marketing.
                Focused on brand positioning, psychology-driven storytelling, and growth strategy.
            </div>

            <div class="profile-buttons">
                <div class="action-btn" onclick="openModal('contact')">Contact</div>
                <div class="action-btn" onclick="openModal('message')">Message</div>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="post" onclick="openModal('education')">Education</div>
        <div class="post" onclick="openModal('experience')">Experience</div>
        <div class="post" onclick="openModal('skills')">Skills</div>
        <div class="post" onclick="openModal('projects')">Projects</div>
        <div class="post" onclick="openModal('certifications')">Certifications</div>
        <div class="post" onclick="openModal('achievements')">Achievements</div>
    </div>
</section>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="closeModal()">Close ✕</div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
const modal=document.getElementById("modal");
const body=document.getElementById("modal-body");

function openProfile(){
    document.getElementById("landing").style.display="none";
    document.getElementById("profile").style.display="block";
}

function openModal(type){
    const content={
        education:`<h2>Education</h2><p>BBA in International Business</p>`,
        experience:`<h2>Experience</h2><p>Executive Assistant – McKinsey & Company</p>`,
        skills:`<h2>Skills</h2><p>Digital Marketing, Content Strategy, SQL, Communication</p>`,
        projects:`<h2>Projects</h2><p>Brand strategy simulations and content initiatives.</p>`,
        certifications:`<h2>Certifications</h2><p>Google Digital Marketing Certification</p>`,
        achievements:`<h2>Achievements</h2><p>Selected at McKinsey through competitive process.</p>`,
        contact:`<h2>Contact</h2><p>Email: yourmail@email.com</p><p>LinkedIn: linkedin.com/in/yourprofile</p>`,
        message:`
            <h2>Send a Message</h2>
            <form action="mailto:yourmail@email.com" method="POST" enctype="text/plain">
                <input type="text" name="Name" placeholder="Your Name" required>
                <input type="email" name="Email" placeholder="Your Email" required>
                <textarea name="Message" rows="4" placeholder="Your Message" required></textarea>
                <button type="submit">Send</button>
            </form>
        `
    };

    body.innerHTML=content[type];
    modal.classList.add("active");
    document.body.style.overflow="hidden";
}

function closeModal(){
    modal.classList.remove("active");
    document.body.style.overflow="auto";
}

modal.addEventListener("click",e=>{
    if(e.target===modal) closeModal();
});

document.addEventListener("keydown",e=>{
    if(e.key==="Escape") closeModal();
});
</script>

</body>
</html>
