<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sruthikaa Bala</title>

<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#ff2e2e;
  --secondary:#000000;
  --bg-gradient:linear-gradient(135deg,#8B0000,#000 40%,#000 60%,#8B0000);
  --tile-border:linear-gradient(45deg,#ff2e2e,#000);
  --text-anim:linear-gradient(270deg,#ffffff,#ff2e2e,#ffffff);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  color:white;
  overflow-x:hidden;
  transition:0.5s ease;
}

/* Animated Background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:var(--bg-gradient);
  background-size:400% 400%;
  animation:bgFlow 20s ease infinite;
  z-index:-1;
}
@keyframes bgFlow{
  0%{background-position:0% 0%;}
  50%{background-position:100% 100%;}
  100%{background-position:0% 0%;}
}

/* THEME SWITCH */
.theme-switch{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  z-index:999;
}
.theme-label{font-size:14px;opacity:0.8;}
.theme-circle{
  width:18px;height:18px;border-radius:50%;
  background:var(--tile-border);
  border:2px solid white;
}

/* PROFILE */
.profile{text-align:center;margin:80px 0 30px;}
.profile img{
  width:140px;height:140px;border-radius:50%;
  padding:4px;background:var(--tile-border);
  object-fit:cover;
}
.profile h1{
  font-family:'ADLaM Display',cursive;
  font-size:32px;
  background:var(--text-anim);
  -webkit-background-clip:text;
  color:transparent;
  animation:textSweep 6s linear infinite;
}
.profile p{margin-top:10px;font-size:16px;opacity:0.9;}

/* GRID */
.grid{
  display:grid;
  gap:25px;
  max-width:1100px;
  margin:auto;
}
@media(min-width:768px){
  .grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:767px){
  .grid{grid-template-columns:1fr;}
}

.tile{
  height:160px;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'ADLaM Display',cursive;
  font-size:20px;
  cursor:pointer;
  position:relative;
  transition:0.4s ease;
}
.tile::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  padding:2px;
  background:var(--tile-border);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}
.tile:hover{
  transform:scale(1.07);
  box-shadow:0 0 30px var(--primary);
}
.tile span{
  background:var(--text-anim);
  background-size:400% 400%;
  -webkit-background-clip:text;
  color:transparent;
  animation:textSweep 5s linear infinite;
  transition:0.3s;
}

/* Text animation */
@keyframes textSweep{
  0%{background-position:100%;}
  100%{background-position:-100%;}
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(12px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.modal.active{display:flex;}

.modal-card{
  width:360px;
  height:460px;
  perspective:1300px;
}
.card-inner{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.4,.2,.2,1);
}
.card-inner.flip{transform:rotateY(180deg);}

.card-front,.card-back{
  position:absolute;
  width:100%;height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:25px;
  text-align:center;
}
.card-front{
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 35px var(--primary);
  font-family:'ADLaM Display',cursive;
  font-size:24px;
}
.card-back{
  background:black;
  transform:rotateY(180deg);
  overflow:auto;
}
.close-btn{
  position:absolute;
  top:20px;
  right:30px;
  cursor:pointer;
  font-size:22px;
}

/* THEME CLASSES */
.theme-red{
  --primary:#ff2e2e;
  --secondary:#000;
  --bg-gradient:linear-gradient(135deg,#8B0000,#000 40%,#000 60%,#8B0000);
  --tile-border:linear-gradient(45deg,#ff2e2e,#000);
  --text-anim:linear-gradient(270deg,#ffffff,#ff2e2e,#ffffff);
}
.theme-insta{
  --primary:#C13584;
  --bg-gradient:linear-gradient(135deg,#833AB4,#C13584,#E1306C,#FD1D1D,#FCAF45);
  --tile-border:linear-gradient(45deg,#833AB4,#E1306C,#FCAF45);
  --text-anim:linear-gradient(270deg,#ffffff,#ffffff,#ffffff);
}
.theme-blue{
  --primary:#00aaff;
  --bg-gradient:linear-gradient(135deg,#001f3f,#000 40%,#000 60%,#001f3f);
  --tile-border:linear-gradient(45deg,#00aaff,#000);
  --text-anim:linear-gradient(270deg,#00aaff,#ffffff,#00aaff);
}
</style>
</head>

<body class="theme-red">

<div class="theme-switch" onclick="switchTheme()">
  <div class="theme-label">Theme</div>
  <div class="theme-circle"></div>
</div>

<div class="profile">
  <img src="portfolio picture.jpg">
  <h1>Sruthikaa Bala</h1>
  <p>Digital marketing aspirant transitioning from executive assistance at McKinsey.</p>
</div>

<div class="grid">
  <div class="tile" onclick="openTile('EDUCATION','Education details here')"><span>EDUCATION</span></div>
  <div class="tile" onclick="openTile('EXPERIENCE','Experience details here')"><span>EXPERIENCE</span></div>
  <div class="tile" onclick="openTile('SKILLS','Skills here')"><span>SKILLS</span></div>
  <div class="tile" onclick="openTile('PROJECTS','Projects here')"><span>PROJECTS</span></div>
  <div class="tile" onclick="openTile('CERTIFICATIONS','Certifications here')"><span>CERTIFICATIONS</span></div>
  <div class="tile" onclick="openTile('ACHIEVEMENTS','Achievements here')"><span>ACHIEVEMENTS</span></div>
</div>

<div class="modal" id="modal">
  <div class="close-btn" onclick="closeModal()">✕</div>
  <div class="modal-card">
    <div class="card-inner" id="cardInner">
      <div class="card-front" id="cardFront"></div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>
</div>

<script>
let themes=["theme-red","theme-insta","theme-blue"];
let current=0;

function switchTheme(){
  document.body.classList.remove(themes[current]);
  current=(current+1)%themes.length;
  document.body.classList.add(themes[current]);
}

let modal=document.getElementById("modal");
let cardInner=document.getElementById("cardInner");
let cardFront=document.getElementById("cardFront");
let cardBack=document.getElementById("cardBack");

function openTile(title,content){
  modal.classList.add("active");
  document.body.style.overflow="hidden";
  cardFront.innerText=title;
  cardBack.innerText=content;
  cardInner.classList.remove("flip");

  setTimeout(()=>{cardInner.classList.add("flip");},1000);
}

function closeModal(){
  cardInner.classList.remove("flip");
  setTimeout(()=>{modal.classList.remove("active");},500);
  document.body.style.overflow="auto";
}
</script>

</body>
</html>
