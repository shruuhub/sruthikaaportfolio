<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sruthikaa Bala</title>

<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg1:#000;
  --bg2:#7a0000;
  --tile-outline:#ff0033;
  --tile-text:#fff;
  --neon:#ff0033;
  --glass:rgba(255,255,255,0.06);
}

/* ---------------- GLOBAL ---------------- */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  background:linear-gradient(135deg,var(--bg2),#000 40%,#000 60%,var(--bg2));
  background-size:300% 300%;
  animation:bgMove 12s ease-in-out infinite alternate;
  transition:background 0.6s ease;
}

@keyframes bgMove{
  0%{background-position:100% 0%}
  100%{background-position:0% 100%}
}

/* Blur lock */
.blur{
  filter:blur(10px);
  pointer-events:none;
}

/* ---------------- HEADER ---------------- */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 8%;
}

h1{
  font-family:'ADLaM Display',cursive;
  font-size:32px;
  background:linear-gradient(90deg,#ff0000,#000);
  -webkit-background-clip:text;
  color:transparent;
}

.theme-selector select{
  padding:6px 12px;
  border-radius:20px;
  border:1px solid var(--tile-outline);
  background:black;
  color:white;
  outline:none;
}

/* ---------------- ABOUT ---------------- */

.about{
  text-align:center;
  max-width:700px;
  margin:30px auto;
  line-height:1.6;
}

/* ---------------- TILES ---------------- */

.tiles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:30px;
  padding:40px 10%;
}

.tile{
  height:130px;
  border-radius:18px;
  border:2px solid var(--tile-outline);
  background:var(--glass);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.4s ease;
  position:relative;
  overflow:hidden;
}

.tile span{
  font-family:'ADLaM Display',cursive;
  font-size:20px;
  letter-spacing:2px;
  text-transform:uppercase;
  transition:0.4s ease;
  background:linear-gradient(90deg,#fff,#ff0000);
  -webkit-background-clip:text;
  color:transparent;
}

/* Shine effect */
.tile:hover span{
  transform:scale(1.15);
  text-shadow:0 0 12px var(--neon);
}

/* Neon glow */
.tile:hover{
  box-shadow:0 0 25px var(--neon);
  background:linear-gradient(135deg,rgba(255,0,100,0.15),rgba(255,150,0,0.12));
}

/* ---------------- CARD MODAL ---------------- */

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  opacity:0;
  pointer-events:none;
  transition:0.4s ease;
}

.modal.active{
  opacity:1;
  pointer-events:all;
}

.card{
  width:90%;
  max-width:420px;
  height:260px;
  perspective:1000px;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s cubic-bezier(.25,.8,.25,1);
}

.card.flip .card-inner{
  transform:rotateY(180deg);
}

.card-face{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(255,0,100,0.2),rgba(255,150,0,0.15));
  box-shadow:0 0 25px var(--neon);
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  padding:20px;
}

.card-back{
  transform:rotateY(180deg);
  font-size:14px;
  line-height:1.6;
}

/* ---------------- CONTACT BOX ---------------- */

.popup-box{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  width:90%;
  max-width:400px;
  background:rgba(0,0,0,0.85);
  border-radius:16px;
  border:2px solid var(--tile-outline);
  padding:20px;
  opacity:0;
  transition:0.4s ease;
  box-shadow:0 0 25px var(--neon);
}

.popup-box.active{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.close-btn{
  text-align:right;
  cursor:pointer;
  font-weight:600;
}

/* ---------------- SAKURA ---------------- */

.sakura-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:url('https://images.unsplash.com/photo-1526481280698-8fcc13fd6a3b') center/cover no-repeat;
  opacity:0;
  transition:0.6s ease;
}

.petal{
  position:fixed;
  width:12px;
  height:12px;
  background:pink;
  border-radius:50%;
  opacity:0.7;
  animation:fall 8s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh) translateX(0)}
  100%{transform:translateY(110vh) translateX(50px)}
}

/* Responsive */
@media(max-width:768px){
  .tiles{
    padding:20px;
  }
  .tile{
    height:110px;
  }
}

</style>
</head>
<body>

<div class="sakura-bg"></div>

<header>
<h1>Sruthikaa Bala</h1>
<div class="theme-selector">
<select id="themeSelect">
<option value="red">Red Black</option>
<option value="insta">Instagram</option>
<option value="blue">Blue Black</option>
<option value="sakura">Sakura</option>
</select>
</div>
</header>

<section class="about">
<p>A results-driven professional blending strategy, operations, and creative execution. Structured thinking. Strong communication. Calm under pressure.</p>
</section>

<section class="tiles">
<div class="tile" onclick="openCard('Education')"><span>Education</span></div>
<div class="tile" onclick="openCard('Experience')"><span>Experience</span></div>
<div class="tile" onclick="openCard('Skills')"><span>Skills</span></div>
<div class="tile" onclick="openPopup('Contact details here')"><span>Contact</span></div>
<div class="tile" onclick="openPopup('Message form coming soon')"><span>Message</span></div>
<div class="tile" onclick="openPopup('Resume will be added soon')"><span>Resume</span></div>
</section>

<div class="modal" id="modal">
<div class="card" id="card">
<div class="card-inner">
<div class="card-face" id="cardFront"></div>
<div class="card-face card-back">Detailed content goes here.</div>
</div>
</div>
</div>

<div class="popup-box" id="popup">
<div class="close-btn" onclick="closePopup()">Close</div>
<div id="popupContent"></div>
</div>

<script>

const modal=document.getElementById("modal");
const card=document.getElementById("card");
const cardFront=document.getElementById("cardFront");
const body=document.body;

function openCard(title){
  card.classList.remove("flip");
  cardFront.innerHTML="<h2>"+title+"</h2>";
  modal.classList.add("active");
  body.classList.add("blur");

  setTimeout(()=>{
    card.classList.add("flip");
  },1000);
}

modal.onclick=()=>{
  modal.classList.remove("active");
  body.classList.remove("blur");
  card.classList.remove("flip");
}

function openPopup(text){
  document.getElementById("popupContent").innerText=text;
  document.getElementById("popup").classList.add("active");
  body.classList.add("blur");
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
  body.classList.remove("blur");
}

/* THEMES */

document.getElementById("themeSelect").addEventListener("change",function(){
  const val=this.value;
  const root=document.documentElement;
  document.querySelector(".sakura-bg").style.opacity=0;
  removePetals();

  if(val==="red"){
    root.style.setProperty("--bg2","#7a0000");
    root.style.setProperty("--tile-outline","#ff0033");
    root.style.setProperty("--neon","#ff0033");
  }

  if(val==="insta"){
    root.style.setProperty("--bg2","#833ab4");
    root.style.setProperty("--tile-outline","#fd1d1d");
    root.style.setProperty("--neon","#fd1d1d");
  }

  if(val==="blue"){
    root.style.setProperty("--bg2","#001f7a");
    root.style.setProperty("--tile-outline","#00aaff");
    root.style.setProperty("--neon","#00aaff");
  }

  if(val==="sakura"){
    root.style.setProperty("--bg2","#ff9ecf");
    root.style.setProperty("--tile-outline","#ff69b4");
    root.style.setProperty("--neon","#ff69b4");
    document.querySelector(".sakura-bg").style.opacity=0.4;
    createPetals();
  }
});

function createPetals(){
  for(let i=0;i<20;i++){
    const petal=document.createElement("div");
    petal.className="petal";
    petal.style.left=Math.random()*100+"vw";
    petal.style.animationDuration=5+Math.random()*5+"s";
    document.body.appendChild(petal);
  }
}

function removePetals(){
  document.querySelectorAll(".petal").forEach(p=>p.remove());
}

</script>

</body>
</html>
